<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thai Consonant Drill</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    padding: 8px;
    width: 80%;
    margin-bottom: 15px;
}

button {
    padding: 10px 20px;
    background: #2d8cff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1b6fd9;
}

#quiz-area {
    margin-top: 20px;
    font-size: 22px;
}
</style>
</head>

<body>

<div class="container">
    <h2>CSII Team X presents</h2>
    <h3>Thai Consonants</h3>

    <input type="text" id="nickname" placeholder="Enter your nickname">

    <br>
    <button onclick="startQuiz()">Start Quiz</button>

    <div id="quiz-area"></div>
</div>

<script>
async function startQuiz() {
    const nickname = document.getElementById("nickname").value;

    if (!nickname) {
        alert("Please enter your nickname");
        return;
    }

    try {
        const response = await fetch(
            `https://engilogic-jrpm.onrender.com/start/${nickname}`
        );

        const data = await response.json();

        document.getElementById("quiz-area").innerHTML =
            `<p><strong>${data.nickname}</strong> — Starts: ${data.counter}</p>
             <p>🔥 Thai Consonant Drill Ready!</p>`;

    } catch (error) {
        document.getElementById("quiz-area").innerHTML =
            "<p>Error connecting to server</p>";
    }
}
</script>

</body>
</html>
